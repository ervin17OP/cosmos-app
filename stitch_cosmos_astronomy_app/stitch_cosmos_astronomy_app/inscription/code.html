<style>
        body {
            background-color: #0f0d18;
            font-family: 'Manrope', sans-serif;
            color: #e9e3f5;
            overflow-x: hidden;
        }
        .star-field {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1a1826 0%, #0f0d18 100%);
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(73, 70, 84, 0.4);
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            outline: none;
            border-color: #26fedc;
            box-shadow: 0 0 15px rgba(38, 254, 220, 0.3);
            background: rgba(255, 255, 255, 0.08);
        }
        .plasma-btn {
            background: linear-gradient(45deg, #c799ff, #bb83ff);
            transition: transform 0.2s ease, box-shadow 0.3s ease;
        }
        .plasma-btn:active {
            transform: scale(0.96);
            box-shadow: 0 0 20px rgba(38, 254, 220, 0.4);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="min-h-screen flex flex-col items-center justify-start pb-12">
<!-- Starfield Background -->
<div class="star-field" data-alt="deep space background with a dense field of distant stars and faint purple nebulae dust clouds"></div>
<!-- Top Navigation (Shell suppressed as per Transactional rule, but components used for identity) -->
<header class="flex justify-between items-center px-6 py-4 w-full backdrop-blur-xl bg-white/5 fixed top-0 z-50">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/10 transition-all text-purple-200/70">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<span class="text-2xl font-bold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-cyan-400 drop-shadow-[0_0_8px_rgba(155,93,229,0.6)] font-['Space_Grotesk']">COSMOS</span>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<main class="w-full max-w-md px-6 mt-24 flex flex-col">
<!-- Heading -->
<section class="mb-10">
<h1 class="text-4xl font-semibold tracking-tight text-on-surface mb-2 font-['Space_Grotesk']">Créer un compte</h1>
<p class="text-on-surface-variant text-sm font-body">Commencez votre voyage à travers les galaxies.</p>
</section>
<!-- Registration Form -->
<form class="space-y-6">
<div class="space-y-4">
<div class="relative">
<label class="block text-xs uppercase tracking-widest text-primary mb-1.5 ml-1 font-label">Nom d'utilisateur</label>
<input class="w-full h-14 px-4 rounded-xl glass-input text-on-surface placeholder:text-outline-variant font-body" placeholder="Astronaute_42" type="text"/>
</div>
<div class="relative">
<label class="block text-xs uppercase tracking-widest text-primary mb-1.5 ml-1 font-label">Email</label>
<input class="w-full h-14 px-4 rounded-xl glass-input text-on-surface placeholder:text-outline-variant font-body" placeholder="voyageur@cosmos.io" type="email"/>
</div>
<div class="relative">
<label class="block text-xs uppercase tracking-widest text-primary mb-1.5 ml-1 font-label">Mot de passe</label>
<input class="w-full h-14 px-4 rounded-xl glass-input text-on-surface placeholder:text-outline-variant font-body" placeholder="••••••••••••" type="password"/>
</div>
</div>
<!-- Level Selector -->
<div class="space-y-3">
<label class="block text-xs uppercase tracking-widest text-primary mb-1.5 ml-1 font-label">Niveau d'expertise</label>
<div class="flex gap-3 overflow-x-auto pb-2 scrollbar-hide">
<button class="flex-shrink-0 px-5 py-3 rounded-xl border border-secondary text-secondary bg-secondary/5 font-medium text-sm transition-all whitespace-nowrap" type="button">
                        Débutant
                    </button>
<button class="flex-shrink-0 px-5 py-3 rounded-xl border border-outline-variant text-on-surface-variant hover:border-primary/50 transition-all text-sm whitespace-nowrap" type="button">
                        Amateur
                    </button>
<button class="flex-shrink-0 px-5 py-3 rounded-xl border border-outline-variant text-on-surface-variant hover:border-primary/50 transition-all text-sm whitespace-nowrap" type="button">
                        Expert
                    </button>
</div>
</div>
<!-- Primary CTA -->
<button class="w-full h-14 plasma-btn rounded-[1.125rem] text-on-primary-container font-bold text-lg shadow-lg shadow-primary/20 mt-4" type="submit">
                Créer mon compte
            </button>
</form>
<!-- Social login separator -->
<div class="flex items-center my-8">
<div class="flex-grow h-[1px] bg-outline-variant/30"></div>
<span class="px-4 text-xs font-label uppercase tracking-widest text-outline-variant">ou s'inscrire avec</span>
<div class="flex-grow h-[1px] bg-outline-variant/30"></div>
</div>
<!-- Social Buttons -->
<div class="grid grid-cols-2 gap-4">
<button class="h-14 rounded-xl glass-input flex items-center justify-center gap-3 hover:bg-white/10 transition-all group">
<img alt="Google" class="w-5 h-5 opacity-80 group-hover:opacity-100" data-alt="colorful google logo icon on transparent background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBkGohYlwPyU82CQSOP9acGZkHo2qc_IgdgURxh9BlzTJWIbwRi37UCRza3nptP46mTQiTq7544AhDntmr_mnLmA5ALwaedqVkOkCoDVP1WaLsyhph7qlyKJzrUly-el1_S_o7gdiBvTjJhtywgC9j6qIuRNMBQhxizxokQbUuD9YcQAiTlFsvvfJlFwRUR2153TwT4A9gdrPOyxttPbFFanA-cqkZIpx5MAn00cjCzxhzD_duFZatcLFoukPbJb3w0M_sQ5u0v8uPr"/>
<span class="text-sm font-semibold">Google</span>
</button>
<button class="h-14 rounded-xl glass-input flex items-center justify-center gap-3 hover:bg-white/10 transition-all group">
<span class="material-symbols-outlined text-xl opacity-80 group-hover:opacity-100" data-icon="apple">ios</span>
<span class="text-sm font-semibold">Apple</span>
</button>
</div>
<!-- Bottom Link -->
<p class="mt-10 text-center text-sm font-body text-on-surface-variant">
            Déjà un compte ? 
            <a class="text-secondary font-semibold ml-1 hover:underline underline-offset-4 decoration-secondary/50" href="#">Se connecter</a>
</p>
</main>
<!-- Decoration Element (Asymmetric celestial body) -->
<div class="fixed -bottom-20 -right-20 w-64 h-64 opacity-20 pointer-events-none">
<div class="w-full h-full rounded-full bg-gradient-to-br from-primary to-secondary blur-3xl"></div>
</div>
<div class="fixed -top-10 -left-10 w-48 h-48 opacity-10 pointer-events-none">
<div class="w-full h-full rounded-full bg-tertiary blur-2xl"></div>
</div>
</body></html>
