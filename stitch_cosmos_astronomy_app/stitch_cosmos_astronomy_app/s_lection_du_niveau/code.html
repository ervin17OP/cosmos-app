<!DOCTYPE html>

<html class="dark" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@300;400;500;600;700&amp;family=Cinzel:wght@400;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-fixed-dim": "#b374fe",
                    "on-primary-container": "#340064",
                    "tertiary": "#ffdb8f",
                    "tertiary-dim": "#eabe55",
                    "secondary-fixed-dim": "#00efce",
                    "surface-container-highest": "#272335",
                    "on-tertiary-fixed": "#443100",
                    "tertiary-fixed": "#f9cc61",
                    "surface-dim": "#0f0d18",
                    "surface-container": "#1a1826",
                    "background": "#0f0d18",
                    "secondary-container": "#006b5b",
                    "on-primary": "#440080",
                    "on-tertiary": "#664c00",
                    "surface-bright": "#2d2a3d",
                    "surface-tint": "#c799ff",
                    "on-error": "#490013",
                    "on-tertiary-container": "#5b4400",
                    "secondary-fixed": "#26fedc",
                    "primary": "#c799ff",
                    "secondary-dim": "#00efce",
                    "inverse-surface": "#fdf8ff",
                    "on-background": "#e9e3f5",
                    "on-surface": "#e9e3f5",
                    "inverse-on-surface": "#575362",
                    "on-secondary-fixed-variant": "#006859",
                    "secondary": "#26fedc",
                    "surface-variant": "#272335",
                    "tertiary-container": "#f9cc61",
                    "surface-container-high": "#211d2e",
                    "outline": "#777383",
                    "error-dim": "#d73357",
                    "on-tertiary-fixed-variant": "#674d00",
                    "inverse-primary": "#7b3cc4",
                    "outline-variant": "#494654",
                    "surface": "#0f0d18",
                    "on-secondary-container": "#ddfff5",
                    "on-surface-variant": "#aea8b9",
                    "surface-container-low": "#14121f",
                    "primary-fixed": "#bd87ff",
                    "on-primary-fixed-variant": "#41007a",
                    "primary-dim": "#bb83ff",
                    "on-secondary": "#005d4f",
                    "primary-container": "#bd87ff",
                    "error": "#ff6e84",
                    "tertiary-fixed-dim": "#eabe55",
                    "error-container": "#a70138",
                    "on-error-container": "#ffb2b9",
                    "on-primary-fixed": "#000000",
                    "on-secondary-fixed": "#00483d",
                    "surface-container-lowest": "#000000"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Space Grotesk"],
                    "body": ["Manrope"],
                    "label": ["Space Grotesk"],
                    "cinzel": ["Cinzel"]
            }
          },
        },
      }
    </script>
<style>
        body {
            background-color: #0f0d18;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(199, 153, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(38, 254, 220, 0.05) 0%, transparent 40%);
            min-height: 100vh;
        }
        .star-field {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: radial-gradient(1px 1px at 20px 30px, #eee, rgba(0,0,0,0)),
                              radial-gradient(1.5px 1.5px at 100px 150px, #fff, rgba(0,0,0,0)),
                              radial-gradient(1px 1px at 200px 80px, #ddd, rgba(0,0,0,0));
            background-size: 250px 250px;
            opacity: 0.3;
            z-index: -1;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .selected-glow {
            border-color: #c799ff !important;
            box-shadow: 0 0 20px rgba(155, 93, 229, 0.3);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body text-on-surface">
<div class="star-field"></div>
<!-- Top Navigation (Shell suppressed as per Task/Onboarding rules, but TopAppBar structure used for brand alignment) -->
<header class="flex justify-between items-center px-6 py-4 w-full bg-white/5 backdrop-blur-xl">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-purple-200/70" data-icon="arrow_back">arrow_back</span>
</div>
<h1 class="text-2xl font-bold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-cyan-400 drop-shadow-[0_0_8px_rgba(155,93,229,0.6)] font-headline">
            COSMOS
        </h1>
<div class="w-6"></div> <!-- Spacer for balance -->
</header>
<main class="max-w-md mx-auto px-6 pt-12 pb-24">
<!-- Header Section -->
<div class="text-center mb-12">
<p class="font-cinzel text-on-surface-variant text-xs uppercase tracking-[0.2em] mb-4">
                Avant de commencer
            </p>
<h2 class="font-cinzel font-semibold text-[26px] leading-tight text-on-surface">
                Quel est ton niveau de départ ?
            </h2>
</div>
<!-- Level Cards -->
<div class="space-y-6">
<!-- Beginner Card -->
<button class="w-full text-left glass-card p-6 rounded-xl transition-all duration-300 hover:bg-white/10 group relative overflow-hidden">
<div class="flex justify-between items-start mb-4">
<span class="text-3xl">🔭</span>
<span class="font-label text-[10px] font-bold tracking-widest bg-secondary/10 text-secondary px-3 py-1 rounded-full border border-secondary/20 uppercase">
                        DÉBUTANT
                    </span>
</div>
<h3 class="font-headline text-xl font-bold mb-1">Curieux</h3>
<p class="text-on-surface-variant text-sm leading-relaxed">
                    Je découvre les constellations et les bases de l'astronomie.
                </p>
<!-- Subtle Gradient Overlay -->
<div class="absolute inset-0 bg-gradient-to-br from-secondary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
</button>
<!-- Intermediate Card (Selected State) -->
<button class="w-full text-left glass-card p-6 rounded-xl transition-all duration-300 selected-glow relative overflow-hidden bg-white/10">
<div class="flex justify-between items-start mb-4">
<span class="text-3xl">⚡</span>
<span class="font-label text-[10px] font-bold tracking-widest bg-primary/10 text-primary px-3 py-1 rounded-full border border-primary/20 uppercase">
                        INTERMÉDIAIRE
                    </span>
</div>
<div class="flex items-center gap-2 mb-1">
<h3 class="font-headline text-xl font-bold">Passionné</h3>
<span class="material-symbols-outlined text-primary text-sm" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<p class="text-on-surface-variant text-sm leading-relaxed">
                    Je connais le système solaire et je veux approfondir mes connaissances.
                </p>
<div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent"></div>
</button>
<!-- Advanced Card -->
<button class="w-full text-left glass-card p-6 rounded-xl transition-all duration-300 hover:bg-white/10 group relative overflow-hidden">
<div class="flex justify-between items-start mb-4">
<span class="text-3xl">⚛️</span>
<span class="font-label text-[10px] font-bold tracking-widest bg-error/10 text-error px-3 py-1 rounded-full border border-error/20 uppercase">
                        AVANCÉ
                    </span>
</div>
<h3 class="font-headline text-xl font-bold mb-1">Étudiant</h3>
<p class="text-on-surface-variant text-sm leading-relaxed">
                    Je maîtrise la physique stellaire et je cherche des défis complexes.
                </p>
<div class="absolute inset-0 bg-gradient-to-br from-error/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
</button>
</div>
<!-- Illustration (Floating Astro Theme) -->
<div class="mt-12 flex justify-center opacity-40">
<div class="relative w-48 h-48">
<div class="absolute inset-0 bg-primary/20 blur-3xl rounded-full"></div>
<img alt="Planetary motif" class="w-full h-full object-contain mix-blend-lighten drop-shadow-[0_0_15px_rgba(199,153,255,0.4)]" data-alt="a stylized minimalist 3D rendering of Saturn with glowing rings in a deep purple and cyan cosmic void with distant soft bokeh stars" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDOogbQk9uu6oq6DHYg6QodWpZHSAXi8k7OiSsI08TJAcnLVKrTUXOqRjoaI573ClBNeVaejQ2IJLXOrgaddTU7BCThrBiVWv6Nb0CMX21142lbAePrc73nt6YTmH_VklcVcg_ic5TcPMt6l1j6a1PhTg-zHwIZvKf-GqmwyXhyN9Jia3DF7bU1I4Celny5c6THLqJ98y0YgtXlgYAH0QmVZHoFxYDvnPQbjt2pDutfiL1XmUbFjapGh4FdpXPaRkfLBWRza9Xi_u2Y"/>
</div>
</div>
</main>
<!-- Bottom Action Button -->
<footer class="fixed bottom-0 left-0 w-full px-6 pb-10 pt-6 bg-gradient-to-t from-background via-background/90 to-transparent">
<button class="w-full py-4 rounded-xl font-headline font-bold text-on-primary tracking-wide bg-gradient-to-r from-primary to-primary-dim shadow-[0_10px_40px_rgba(155,93,229,0.3)] hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2">
            Continuer
            <span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</footer>
</body></html>
